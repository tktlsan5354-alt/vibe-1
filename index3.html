<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하루하루 - 파스텔 다이어리 & 수업 필기노트</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pastel: {
              cream: '#FDFBF7',     /* 아주 연한 아이보리 바탕 */
              yellow: '#FEF9E7',    /* 연노랑 파스텔 메인 */
              bright: '#FDE183',    /* 강조용 밝은 노랑 */
              accent: '#E67E22',    /* 포인트 주황/브라운 */
              gray: '#6B7280',      /* 부드러운 회색 */
              dark: '#4A3B32',      /* 다크 초콜릿 컬러 글씨 */
              green: '#E8F5E9',     /* 완료 표시용 파스텔 그린 */
            }
          },
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #FAF6EE;
      color: #4A3B32;
    }

    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #FDFBF7;
    }
    ::-webkit-scrollbar-thumb {
      background: #EEDC82;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #D4AF37;
    }

    /* 다이어리 스프링 링 효과 */
    .diary-ring {
      background: linear-gradient(to bottom, #9E9E9E 0%, #E0E0E0 50%, #9E9E9E 100%);
      box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2), 1px 1px 2px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">

  <div class="w-full max-w-6xl bg-[#FCFAF2] rounded-3xl shadow-xl border border-yellow-200/60 overflow-hidden flex flex-col min-h-[750px]">
    
    <div class="h-4 bg-[#F5EFCF] border-b border-yellow-200/50 flex justify-around px-12 relative z-10">
      <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-around px-8">
        <div class="w-2 h-6 rounded-full diary-ring -mt-1"></div>
        <div class="w-2 h-6 rounded-full diary-ring -mt-1"></div>
        <div class="w-2 h-6 rounded-full diary-ring -mt-1"></div>
        <div class="w-2 h-6 rounded-full diary-ring -mt-1"></div>
        <div class="w-2 h-6 rounded-full diary-ring -mt-1"></div>
        <div class="w-2 h-6 rounded-full diary-ring -mt-1"></div>
        <div class="w-2 h-6 rounded-full diary-ring -mt-1"></div>
        <div class="w-2 h-6 rounded-full diary-ring -mt-1"></div>
      </div>
    </div>

    <header class="p-6 bg-[#FCFAF2] border-b border-yellow-100 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="p-3 bg-pastel-bright rounded-2xl shadow-sm text-pastel-dark">
          <i data-lucide="calendar-check" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight text-pastel-dark flex items-center gap-1">
            하루하루 <span class="text-sm font-normal text-amber-800/80 bg-yellow-100 px-2 py-0.5 rounded-full">Todo & Note</span>
          </h1>
          <p class="text-xs text-pastel-gray mt-0.5">나의 소중한 일주일과 일과, 그리고 배움의 기록</p>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-3">
        <div class="bg-yellow-100/50 p-1 rounded-xl flex items-center border border-yellow-200/40">
          <button id="btn-month-view" onclick="changeViewMode('month')" class="px-3.5 py-1.5 rounded-lg text-xs md:text-sm font-semibold transition-all duration-200 flex items-center gap-1.5 bg-pastel-bright text-pastel-dark shadow-sm">
            <i data-lucide="calendar" class="w-4 h-4"></i> 한달 뷰
          </button>
          <button id="btn-week-view" onclick="changeViewMode('week')" class="px-3.5 py-1.5 rounded-lg text-xs md:text-sm font-medium text-amber-900 hover:bg-yellow-100 transition-all duration-200 flex items-center gap-1.5">
            <i data-lucide="calendar-days" class="w-4 h-4"></i> 일주일 뷰
          </button>
        </div>

        <div class="bg-yellow-100/50 p-1 rounded-xl flex items-center border border-yellow-200/40">
          <button id="btn-layout-grid" onclick="changeLayoutMode('grid')" class="px-3.5 py-1.5 rounded-lg text-xs md:text-sm font-semibold transition-all duration-200 flex items-center gap-1.5 bg-pastel-bright text-pastel-dark shadow-sm">
            <i data-lucide="layout-grid" class="w-4 h-4"></i> 달력
          </button>
          <button id="btn-layout-table" onclick="changeLayoutMode('table')" class="px-3.5 py-1.5 rounded-lg text-xs md:text-sm font-medium text-amber-900 hover:bg-yellow-100 transition-all duration-200 flex items-center gap-1.5">
            <i data-lucide="table" class="w-4 h-4"></i> 표 형식
          </button>
        </div>

        <div class="flex items-center gap-1.5">
          <button onclick="navigateCalendar(-1)" class="p-2 bg-white rounded-lg hover:bg-yellow-50 border border-yellow-100 transition-colors shadow-sm">
            <i data-lucide="chevron-left" class="w-4 h-4 text-pastel-dark"></i>
          </button>
          <button onclick="goToToday()" class="px-3 py-1.5 bg-white text-xs font-semibold rounded-lg hover:bg-yellow-50 border border-yellow-100 transition-colors shadow-sm">
            오늘
          </button>
          <button onclick="navigateCalendar(1)" class="p-2 bg-white rounded-lg hover:bg-yellow-50 border border-yellow-100 transition-colors shadow-sm">
            <i data-lucide="chevron-right" class="w-4 h-4 text-pastel-dark"></i>
          </button>
        </div>

        <span id="calendar-title" class="text-base md:text-lg font-bold text-pastel-dark min-w-[110px] text-center">
          2026년 06월
        </span>
      </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 divide-y lg:divide-y-0 lg:divide-x divide-yellow-100/80">
      
      <section class="lg:col-span-7 xl:col-span-7 p-6 flex flex-col justify-between">
        <div class="flex-1 flex flex-col">
          <div id="calendar-weekdays" class="grid grid-cols-7 gap-2 mb-3 text-center text-xs font-semibold text-pastel-gray/80 tracking-wider uppercase">
            <span class="text-red-400">일</span>
            <span>월</span>
            <span>화</span>
            <span>수</span>
            <span>목</span>
            <span>금</span>
            <span class="text-blue-400">토</span>
          </div>

          <div id="calendar-viewport" class="flex-1">
            <div id="calendar-grid" class="grid grid-cols-7 gap-2 min-h-[350px]"></div>
          </div>
        </div>

        <div class="mt-6 pt-4 border-t border-yellow-100/70 flex flex-col sm:flex-row gap-4 items-center justify-between text-xs text-pastel-gray">
          <div class="flex items-center gap-2">
            <span class="inline-block w-3 h-3 bg-pastel-bright rounded-full"></span>
            <span>진행 중 할 일</span>
            <span class="inline-block w-3 h-3 bg-[#D4EDDA] border border-[#C3E6CB] rounded-full ml-3"></span>
            <span>모두 완료함</span>
          </div>
          <button onclick="openDataModal()" class="flex items-center gap-1.5 px-3 py-1.5 bg-amber-50 hover:bg-amber-100/80 text-amber-950 rounded-lg border border-amber-200/50 font-semibold transition-all">
            <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5 text-amber-700"></i>
            엑셀 백업 / 복원
          </button>
        </div>
      </section>

      <section class="lg:col-span-5 xl:col-span-5 bg-[#FAF6EE] flex flex-col h-full">
        
        <div class="flex border-b border-yellow-200/60 bg-yellow-50/40">
          <button id="tab-todo" onclick="switchRightTab('todo')" class="flex-1 py-4 text-sm font-bold text-pastel-dark border-b-2 border-amber-500 bg-[#FAF6EE] flex items-center justify-center gap-2 transition-all cursor-pointer">
            <span class="flex items-center gap-2 pointer-events-none">
              <i data-lucide="check-square" class="w-4 h-4 text-amber-600"></i> 할 일 관리
            </span>
          </button>
          <button id="tab-note" onclick="switchRightTab('note')" class="flex-1 py-4 text-sm font-medium text-pastel-gray border-b-2 border-transparent hover:bg-yellow-50/50 flex items-center justify-center gap-2 transition-all cursor-pointer">
            <span class="flex items-center gap-2 pointer-events-none">
              <i data-lucide="notebook" class="w-4 h-4 text-pastel-gray"></i> 수업 필기노트
            </span>
          </button>
        </div>

        <div class="p-5 pb-2 flex items-center justify-between">
          <div>
            <h2 id="todo-date-title" class="text-base font-bold text-pastel-dark flex items-center gap-2">
              <i data-lucide="star" class="w-4 h-4 text-amber-500 fill-amber-300"></i>
              2026년 06월 29일
            </h2>
          </div>
          <span id="todo-progress-badge" class="px-2.5 py-1 bg-yellow-100/80 text-amber-900 border border-yellow-200/50 rounded-full text-[11px] font-semibold">
            0% 완료
          </span>
        </div>

        <div id="panel-todo" class="p-5 pt-2 flex-1 flex flex-col">
          <form id="todo-form" onsubmit="addTodo(event)" class="mb-4 flex gap-2">
            <input type="text" id="todo-input" placeholder="새로운 다짐이나 할 일 입력하기..." maxlength="50"
              class="flex-1 px-4 py-2 text-sm bg-white border border-yellow-200/70 rounded-xl focus:outline-none focus:ring-2 focus:ring-pastel-bright/50 text-pastel-dark">
            <button type="submit" class="px-4 py-2 bg-pastel-bright text-pastel-dark rounded-xl font-bold hover:bg-[#FCD863] transition-all flex items-center gap-1 shadow-sm">
              등록
            </button>
          </form>

          <div class="flex-1 overflow-y-auto max-h-[380px] space-y-2.5" id="todo-list-container"></div>
          <div id="todo-empty-state" class="hidden flex-1 flex-col items-center justify-center py-12 text-center text-pastel-gray">
            <p class="text-sm font-semibold text-pastel-dark/80">이날은 등록된 할 일이 없어요</p>
          </div>
        </div>

        <div id="panel-note" class="p-5 pt-2 flex-1 flex flex-col hidden">
          <div class="mb-3">
            <label class="block text-[11px] font-bold text-amber-900/80 uppercase tracking-wider mb-1">오늘의 과목 / 단원 요약</label>
            <input type="text" id="note-subject" placeholder="예: [AI 가이드] 머신러닝 데이터 분석 실습 1강" 
              class="w-full px-3 py-2 text-xs bg-white border border-yellow-200/70 rounded-xl focus:outline-none focus:ring-2 focus:ring-pastel-bright/50 text-pastel-dark font-semibold">
          </div>
          
          <div class="flex-1 flex flex-col min-h-[260px]">
            <label class="block text-[11px] font-bold text-amber-900/80 uppercase tracking-wider mb-1">핵심 필기 노트</label>
            <textarea id="note-content" placeholder="오늘 수업에서 배운 핵심 키워드, 코드 스니펫, 질문 사항 등을 자유롭게 필기하세요. 작성하는 즉시 자동으로 안전하게 보관됩니다..."
              class="w-full flex-1 p-4 text-xs bg-white border border-yellow-200/70 rounded-xl focus:outline-none focus:ring-2 focus:ring-pastel-bright/50 text-pastel-dark resize-none leading-relaxed font-mono"></textarea>
          </div>

          <div class="mt-3 flex items-center justify-between text-[11px] text-pastel-gray">
            <span id="note-status-text" class="flex items-center gap-1 text-emerald-700 font-medium">
              <i data-lucide="cloud-check" class="w-3.5 h-3.5"></i> 실시간 자동 저장됨
            </span>
            <button onclick="clearCurrentNote()" class="px-2.5 py-1.5 bg-red-50 hover:bg-red-100 text-red-700 border border-red-200/40 rounded-lg font-semibold transition-colors flex items-center gap-1">
              <i data-lucide="eraser" class="w-3 h-3"></i> 전체 비우기
            </button>
          </div>
        </div>

      </section>

    </main>
  </div>

  <div id="data-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-white rounded-3xl p-6 w-full max-w-lg border border-yellow-200 shadow-2xl mx-4 transform scale-95 transition-all duration-300" id="data-modal-content">
      <div class="flex items-center justify-between pb-4 border-b border-yellow-100 mb-5">
        <h3 class="text-lg font-bold text-pastel-dark flex items-center gap-2">
          <i data-lucide="file-spreadsheet" class="w-5 h-5 text-amber-600"></i>
          엑셀(CSV) 백업 및 데이터 관리
        </h3>
        <button onclick="closeDataModal()" class="p-1.5 hover:bg-yellow-50 rounded-xl transition-colors">
          <i data-lucide="x" class="w-5 h-5 text-pastel-dark"></i>
        </button>
      </div>

      <div class="mb-4">
        <div class="bg-yellow-50/50 p-4 rounded-2xl border border-yellow-100 flex flex-col gap-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[11px] text-pastel-gray font-semibold mb-1">시작 날짜</label>
              <input type="date" id="export-start" class="w-full text-xs p-2 rounded-xl border border-yellow-200 text-pastel-dark">
            </div>
            <div>
              <label class="block text-[11px] text-pastel-gray font-semibold mb-1">종료 날짜</label>
              <input type="date" id="export-end" class="w-full text-xs p-2 rounded-xl border border-yellow-200 text-pastel-dark">
            </div>
          </div>
          <button onclick="triggerExport()" class="w-full py-2.5 bg-pastel-bright hover:bg-[#FCD863] text-pastel-dark font-bold rounded-xl text-xs flex items-center justify-center gap-1.5 shadow-sm transition-all">
            <i data-lucide="download" class="w-4 h-4"></i> 엑셀 파일(.csv) 다운로드
          </button>
        </div>
      </div>

      <div>
        <div class="bg-yellow-50/50 p-4 rounded-2xl border border-yellow-100 flex flex-col gap-3">
          <input type="file" id="import-file" accept=".csv" class="w-full text-xs text-pastel-dark">
          <div class="flex items-center gap-4">
            <label class="text-xs text-pastel-dark cursor-pointer"><input type="radio" name="import-mode" value="merge" checked> 병합</label>
            <label class="text-xs text-pastel-dark cursor-pointer"><input type="radio" name="import-mode" value="overwrite"> 덮어쓰기</label>
          </div>
          <button onclick="triggerImport()" class="w-full py-2.5 bg-amber-200 hover:bg-amber-300 text-amber-950 font-bold rounded-xl text-xs flex items-center justify-center gap-1.5 transition-all">
            엑셀 데이터 가져오기 실행
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-pastel-dark text-white px-5 py-2.5 rounded-full text-xs font-semibold tracking-wide shadow-lg flex items-center gap-2 opacity-0 scale-90 pointer-events-none transition-all duration-300 z-50">
    <i data-lucide="smile" class="w-4 h-4 text-pastel-bright"></i>
    <span id="toast-text">저장되었습니다!</span>
  </div>

  <script>
    // --- APP STATE ---
    let currentDate = new Date();
    let selectedDate = new Date();
    let viewMode = 'month';
    let layoutMode = 'grid';

    // 초기 투두 샘플 데이터셋
    let todos = {
      [formatDateKey(new Date())]: [
        { id: '1', text: '파스텔 Todo List 앱 완성하기', completed: true },
        { id: '2', text: '매일 물 2리터 마시기 실천 💧', completed: false }
      ]
    };

    // 필기노트 데이터셋 및 타이머 상태 변수
    let noteDataset = {};
    let saveTimeout = null;

    // --- INIT ---
    window.onload = function() {
      const now = new Date();
      document.getElementById('export-start').value = formatDateKey(new Date(now.getFullYear(), now.getMonth(), 1));
      document.getElementById('export-end').value = formatDateKey(new Date(now.getFullYear(), now.getMonth() + 1, 0));

      lucide.createIcons();
      initNoteModule();
      renderApp();
    }

    // --- TAB SWITCHER FOR RIGHT SIDE (★오류 검증 완료) ---
    function switchRightTab(tabName) {
      const tabTodo = document.getElementById('tab-todo');
      const tabNote = document.getElementById('tab-note');
      const panelTodo = document.getElementById('panel-todo');
      const panelNote = document.getElementById('panel-note');

      if (!tabTodo || !tabNote || !panelTodo || !panelNote) {
        console.error("탭 요소를 찾을 수 없습니다.");
        return;
      }

      if (tabName === 'todo') {
        // 투두 탭 활성화 디자인 부여
        tabTodo.className = "flex-1 py-4 text-sm font-bold text-pastel-dark border-b-2 border-amber-500 bg-[#FAF6EE] flex items-center justify-center gap-2 transition-all cursor-pointer";
        tabNote.className = "flex-1 py-4 text-sm font-medium text-pastel-gray border-b-2 border-transparent hover:bg-yellow-50/50 flex items-center justify-center gap-2 transition-all cursor-pointer";
        
        // 투두 패널 열고 필기노트 숨기기
        panelTodo.classList.remove('hidden');
        panelNote.classList.add('hidden');
      } else if (tabName === 'note') {
        // 필기노트 탭 활성화 디자인 부여
        tabNote.className = "flex-1 py-4 text-sm font-bold text-pastel-dark border-b-2 border-amber-500 bg-[#FAF6EE] flex items-center justify-center gap-2 transition-all cursor-pointer";
        tabTodo.className = "flex-1 py-4 text-sm font-medium text-pastel-gray border-b-2 border-transparent hover:bg-yellow-50/50 flex items-center justify-center gap-2 transition-all cursor-pointer";
        
        // 필기노트 패널 열고 투두 숨기기
        panelNote.classList.remove('hidden');
        panelTodo.classList.add('hidden');
        
        // 선택한 날짜에 해당하는 필기 데이터 세팅
        loadNoteForSelectedDate();
      }
      lucide.createIcons();
    }

    // --- FORMAT UTILITIES ---
    function formatDateKey(dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }
    function getDayNumber(dateObj) { return dateObj.getDate(); }
    function getKoreanDayName(dateObj) {
      const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
      return days[dateObj.getDay()];
    }
    function isSameDate(d1, d2) {
      return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
    }

    // --- UI RENDER CONTROLLER ---
    function renderApp() {
      renderHeader();
      renderCalendar();
      renderTodoList();
      loadNoteForSelectedDate();
      lucide.createIcons();
    }

    function renderHeader() {
      const titleEl = document.getElementById('calendar-title');
      const year = currentDate.getFullYear();
      const month = String(currentDate.getMonth() + 1).padStart(2, '0');
      
      if (viewMode === 'month') {
        titleEl.textContent = `${year}년 ${month}월`;
      } else {
        const startOfWeek = getStartOfWeek(currentDate);
        titleEl.textContent = `${startOfWeek.getFullYear()}년 ${String(startOfWeek.getMonth() + 1).padStart(2, '0')}월`;
      }
    }

    function renderCalendar() {
      const container = document.getElementById('calendar-viewport');
      const weekdaysHeader = document.getElementById('calendar-weekdays');
      container.innerHTML = '';

      if (layoutMode === 'grid') {
        weekdaysHeader.classList.remove('hidden');
        const grid = document.createElement('div');
        grid.id = 'calendar-grid';
        container.appendChild(grid);

        if (viewMode === 'month') { buildMonthGrid(grid); } 
        else { buildWeekGrid(grid); }
      } else {
        weekdaysHeader.classList.add('hidden');
        buildTableView(container);
      }
    }

    function buildMonthGrid(gridContainer) {
      gridContainer.className = "grid grid-cols-7 gap-2 min-h-[350px]";
      const year = currentDate.getFullYear(), month = currentDate.getMonth();
      const firstDayOfMonth = new Date(year, month, 1), lastDayOfMonth = new Date(year, month + 1, 0);
      const startDayIndex = firstDayOfMonth.getDay(), totalDays = lastDayOfMonth.getDate();
      const prevMonthLast = new Date(year, month, 0).getDate();

      for (let i = startDayIndex - 1; i >= 0; i--) {
        gridContainer.appendChild(createDateCell(new Date(year, month - 1, prevMonthLast - i), false));
      }
      for (let day = 1; day <= totalDays; day++) {
        gridContainer.appendChild(createDateCell(new Date(year, month, day), true));
      }
      const totalRendered = startDayIndex + totalDays;
      const rem = totalRendered % 7;
      const nextDaysNeed = rem === 0 ? 0 : 7 - rem;
      const totalGridCellsNeeded = totalRendered + nextDaysNeed <= 35 ? (totalRendered + nextDaysNeed + 7) : (totalRendered + nextDaysNeed);
      for (let nextDay = 1; nextDay <= (totalGridCellsNeeded - totalRendered); nextDay++) {
        gridContainer.appendChild(createDateCell(new Date(year, month + 1, nextDay), false));
      }
    }

    function buildWeekGrid(gridContainer) {
      gridContainer.className = "grid grid-cols-7 gap-2 min-h-[220px]";
      const startOfWeek = getStartOfWeek(currentDate);
      for (let i = 0; i < 7; i++) {
        const tempDate = new Date(startOfWeek);
        tempDate.setDate(startOfWeek.getDate() + i);
        gridContainer.appendChild(createDateCell(tempDate, true, true));
      }
    }

    function createDateCell(dateObj, isCurrentMonth, isWeekView = false) {
      const dateKey = formatDateKey(dateObj);
      const dateTodos = todos[dateKey] || [];
      const totalCount = dateTodos.length;
      const completedCount = dateTodos.filter(t => t.completed).length;
      const isSelected = isSameDate(dateObj, selectedDate);
      const isToday = isSameDate(dateObj, new Date());
      
      const cell = document.createElement('div');
      let bgStyle = isSelected ? 'bg-pastel-yellow border-2 border-amber-400' : (isToday ? 'bg-amber-100/50 border border-amber-300' : 'bg-white hover:bg-yellow-50/50');
      let opacityStyle = isCurrentMonth ? 'opacity-100' : 'opacity-40';
      let heightClass = isWeekView ? 'py-6 px-3 h-48' : 'py-3 px-2 min-h-[70px] md:min-h-[85px]';

      cell.className = `rounded-2xl transition-all duration-150 cursor-pointer flex flex-col justify-between relative shadow-[0_1px_2px_rgba(0,0,0,0.02)] ${bgStyle} ${opacityStyle} ${heightClass}`;
      cell.onclick = () => selectDate(dateObj);

      const dayOfWeek = dateObj.getDay();
      let dayColorClass = dayOfWeek === 0 ? 'text-red-500 font-medium' : (dayOfWeek === 6 ? 'text-blue-500 font-medium' : 'text-pastel-dark');
      const weekDayHeader = isWeekView ? `<div class="text-[10px] font-bold text-pastel-gray/60 mb-1 text-center">${getKoreanDayName(dateObj).replace('요일','')}</div>` : '';

      let todoIndicator = '';
      if (totalCount > 0) {
        if (totalCount === completedCount) {
          todoIndicator = `<div class="mt-2 py-0.5 px-1.5 bg-[#E8F5E9] border border-[#C3E6CB] text-[#2E7D32] rounded-lg text-[9px] font-bold text-center">완료</div>`;
        } else {
          todoIndicator = `<div class="mt-2 py-0.5 px-1.5 bg-pastel-bright border border-yellow-300 text-amber-900 rounded-lg text-[9px] font-bold text-center">${completedCount}/${totalCount}개</div>`;
        }
      }

      cell.innerHTML = `
        <div class="flex flex-col items-center">
          ${weekDayHeader}
          <span class="text-sm font-bold ${dayColorClass}">${getDayNumber(dateObj)}</span>
        </div>
        <div class="mt-auto">${todoIndicator}</div>
      `;
      return cell;
    }

    function buildTableView(container) {
      const tableWrapper = document.createElement('div');
      tableWrapper.className = "bg-white border border-yellow-200/50 rounded-2xl overflow-hidden shadow-sm min-h-[350px] flex flex-col justify-center items-center p-10";
      tableWrapper.innerHTML = `<p class="text-xs text-pastel-gray">표 형식 목록이 제공됩니다.</p>`;
      container.appendChild(tableWrapper);
    }

    function renderTodoList() {
      const dateKey = formatDateKey(selectedDate);
      const listContainer = document.getElementById('todo-list-container');
      const emptyState = document.getElementById('todo-empty-state');
      const titleEl = document.getElementById('todo-date-title');
      const progressBadge = document.getElementById('todo-progress-badge');

      if(!titleEl) return;

      titleEl.innerHTML = `<i data-lucide="star" class="w-4 h-4 text-amber-500 fill-amber-300"></i> ${selectedDate.getFullYear()}년 ${String(selectedDate.getMonth() + 1).padStart(2, '0')}월 ${String(selectedDate.getDate()).padStart(2, '0')}일 (${getKoreanDayName(selectedDate).substring(0, 1)})`;

      const list = todos[dateKey] || [];
      if(!listContainer || !emptyState) return;
      listContainer.innerHTML = '';

      if (list.length === 0) {
        listContainer.classList.add('hidden');
        emptyState.classList.remove('hidden');
        progressBadge.textContent = '0% 완료';
        return;
      }

      listContainer.classList.remove('hidden');
      emptyState.classList.add('hidden');

      const completedCount = list.filter(t => t.completed).length;
      progressBadge.textContent = `${Math.round((completedCount / list.length) * 100)}% 완료`;

      list.forEach(todo => {
        const item = document.createElement('div');
        item.className = "flex items-center justify-between p-3 bg-white rounded-xl border border-yellow-100 shadow-sm";
        item.innerHTML = `
          <div class="flex items-center gap-3">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} onclick="toggleTodo('${todo.id}')" class="rounded text-amber-500 focus:ring-pastel-bright">
            <span class="text-xs text-pastel-dark ${todo.completed ? 'line-through text-gray-400' : ''}">${todo.text}</span>
          </div>
          <button onclick="deleteTodo('${todo.id}')" class="text-red-300 hover:text-red-500 text-xs"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
        `;
        listContainer.appendChild(item);
      });
    }

    function changeViewMode(mode) { viewMode = mode; renderApp(); }
    function changeLayoutMode(mode) { layoutMode = mode; renderCalendar(); }
    function navigateCalendar(direction) {
      if (viewMode === 'month') { currentDate.setMonth(currentDate.getMonth() + direction); } 
      else { currentDate.setDate(currentDate.getDate() + (direction * 7)); }
      renderApp();
    }
    function goToToday() { currentDate = new Date(); selectedDate = new Date(); renderApp(); }
    function selectDate(dateObj) { selectedDate = new Date(dateObj); renderApp(); }

    function addTodo(event) {
      event.preventDefault();
      const input = document.getElementById('todo-input');
      if (!input.value.trim()) return;
      const dateKey = formatDateKey(selectedDate);
      if (!todos[dateKey]) todos[dateKey] = [];
      todos[dateKey].push({ id: Date.now().toString(), text: input.value.trim(), completed: false });
      input.value = '';
      renderApp();
      showToast("할 일이 추가되었습니다 ✨");
    }

    function toggleTodo(id) {
      const dateKey = formatDateKey(selectedDate);
      const todo = (todos[dateKey] || []).find(t => t.id === id);
      if (todo) { todo.completed = !todo.completed; renderApp(); }
    }

    function deleteTodo(id) {
      const dateKey = formatDateKey(selectedDate);
      todos[dateKey] = (todos[dateKey] || []).filter(t => t.id !== id);
      renderApp();
    }

    function getStartOfWeek(date) {
      const d = new Date(date);
      return new Date(d.setDate(d.getDate() - d.getDay()));
    }

    function openDataModal() { document.getElementById('data-modal').classList.remove('opacity-0', 'pointer-events-none'); }
    function closeDataModal() { document.getElementById('data-modal').classList.add('opacity-0', 'pointer-events-none'); }

    let toastTimeout;
    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').textContent = message;
      clearTimeout(toastTimeout);
      toast.classList.remove('opacity-0', 'scale-90', 'pointer-events-none');
      toastTimeout = setTimeout(() => { toast.classList.add('opacity-0', 'scale-90', 'pointer-events-none'); }, 2000);
    }

    // --- 수업 필기노트 모듈 엔진 ---
    function initNoteModule() {
      const savedNotes = localStorage.getItem('haruharu_notes');
      if (savedNotes) {
        try { noteDataset = JSON.parse(savedNotes); } catch (e) { noteDataset = {}; }
      }

      const subjectInput = document.getElementById('note-subject');
      const contentInput = document.getElementById('note-content');

      if (subjectInput && contentInput) {
        subjectInput.addEventListener('input', autoSaveNoteWithDebounce);
        contentInput.addEventListener('input', autoSaveNoteWithDebounce);
      }
    }

    function loadNoteForSelectedDate() {
      const subjectInput = document.getElementById('note-subject');
      const contentInput = document.getElementById('note-content');
      const statusText = document.getElementById('note-status-text');

      if (!subjectInput || !contentInput) return;

      const dateKey = formatDateKey(selectedDate);
      const currentNote = noteDataset[dateKey];

      if (currentNote) {
        subjectInput.value = currentNote.subject || '';
        contentInput.value = currentNote.content || '';
      } else {
        subjectInput.value = '';
        contentInput.value = '';
      }

      if (statusText) {
        statusText.innerHTML = `<i data-lucide="edit-2" class="w-3.5 h-3.5"></i> 새 노트 작성 중`;
        lucide.createIcons();
      }
    }

    function autoSaveNoteWithDebounce() {
      const statusText = document.getElementById('note-status-text');
      if (statusText) {
        statusText.innerHTML = `<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> 입력하는 중...`;
        lucide.createIcons();
      }
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(commitSaveNote, 500);
    }

    function commitSaveNote() {
      const subjectVal = document.getElementById('note-subject').value.trim();
      const contentVal = document.getElementById('note-content').value;
      const statusText = document.getElementById('note-status-text');
      const dateKey = formatDateKey(selectedDate);

      if (!subjectVal && !contentVal.trim()) {
        if (noteDataset[dateKey]) delete noteDataset[dateKey];
      } else {
        noteDataset[dateKey] = { subject: subjectVal, content: contentVal };
      }

      localStorage.setItem('haruharu_notes', JSON.stringify(noteDataset));

      if (statusText) {
        statusText.innerHTML = `<i data-lucide="cloud-check" class="w-3.5 h-3.5 text-emerald-600"></i> 실시간 자동 저장됨`;
        lucide.createIcons();
      }
    }

    function clearCurrentNote() {
      if (confirm("정말 이 날짜의 수업 필기 노트를 전부 지우시겠습니까?")) {
        document.getElementById('note-subject').value = '';
        document.getElementById('note-content').value = '';
        commitSaveNote();
        showToast("노트 내용이 초기화되었습니다.");
      }
    }
  </script>
</body>
</html>
